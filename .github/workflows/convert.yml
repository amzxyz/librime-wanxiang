name: Convert PyTorch to NCNN via PNNX

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. 检出代码 (获取你的 .pt 模型)
        uses: actions/checkout@v4

      - name: 2. 通过 Pip 极速安装 PNNX 神器
        run: |
          python -m pip install --upgrade pip
          pip install pnnx

      - name: 3. 执行纯血降维转换
        run: |
          cd data
          
          # 🚀 核心指令：直吃 PyTorch 模型，自动吐出 NCNN 格式！
          # 💡 注意这里的细节：因为咱们代码里输入是 torch.long，
          # 所以必须在 shape 后面加上 i64 (代表 64位整数)，这样引擎就能完美识别查字典操作！
          pnnx rime_morandi_lm.pt "inputshape=[1,3]i64"
          
          # PNNX 默认生成 .bin 权重文件，为了配合咱们 C++ 代码，重命名为 .model
          mv rime_morandi_lm.ncnn.bin rime_morandi_lm.ncnn.model
          
          echo "=== 🎯 PNNX 转换成功！预览纯净 param 头部 ==="
          head -n 15 rime_morandi_lm.ncnn.param

      - name: 4. 上传最终产物
        uses: actions/upload-artifact@v4
        with:
          name: pure-ncnn-models
          path: |
            data/rime_morandi_lm.ncnn.param
            data/rime_morandi_lm.ncnn.model